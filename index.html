<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live NBA Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07080a;
            --bg-glow: #1a1025;
            --card-bg: rgba(24, 25, 30, 0.65);
            --text-main: #ffffff;
            --text-muted: #8e93a6;
            --accent-primary: #ff512f;
            --accent-secondary: #f09819;
            --live-red: #ff2a2a;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top, var(--bg-glow) 0%, var(--bg-dark) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 20px 15px 80px 15px; 
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
        }

        /* --- CLASH ANIMATION STYLES --- */
        .clash-screen {
            position: fixed; inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 2000;
            display: none;
            align-items: center; justify-content: center;
            flex-direction: column;
            transition: opacity 0.3s ease;
        }
        
        .clash-element { position: absolute; opacity: 0; display: flex; align-items: center; justify-content: center; }
        .clash-logo { width: 250px; height: 250px; filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8)); }
        
        .clash-vs-text {
            font-size: 8rem; font-weight: 900; font-style: italic; text-transform: uppercase;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 81, 47, 0.8)); letter-spacing: -5px;
        }

        @keyframes slamFade {
            0% { opacity: 0; transform: scale(5) translateZ(0); filter: blur(10px); }
            15% { opacity: 1; transform: scale(0.9) translateZ(0); filter: blur(0px); }
            25% { transform: scale(1.05) translateZ(0); }
            35% { transform: scale(1) translateZ(0); }
            80% { opacity: 1; transform: scale(1) translateZ(0); }
            100% { opacity: 0; transform: scale(0.5) translateZ(0); filter: blur(5px); }
        }

        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-10px, -10px); }
            20% { transform: translate(10px, 10px); }
            30% { transform: translate(-10px, 10px); }
            40% { transform: translate(10px, -10px); }
            50% { transform: translate(0, 0); }
        }

        /* --- LOADING SCREEN STYLES --- */
        .loading-screen {
            position: fixed; inset: 0; background: var(--bg-dark);
            background-image: radial-gradient(circle at center, #1a1025 0%, #07080a 100%);
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            opacity: 1; transition: opacity 0.6s ease-out, visibility 0.6s;
        }
        .loading-screen.hidden { opacity: 0; visibility: hidden; }
        .logo-cycler { width: 180px; height: 180px; animation: spin-and-pulse 2.5s infinite ease-in-out; filter: drop-shadow(0 0 25px rgba(255, 81, 47, 0.6)); }
        .logo-cycler img { width: 100%; height: 100%; object-fit: contain; }
        
        @keyframes spin-and-pulse {
            0% { transform: scale(0.9) rotate(0deg); }
            50% { transform: scale(1.15) rotate(180deg); filter: drop-shadow(0 0 40px rgba(240, 152, 25, 0.8)); }
            100% { transform: scale(0.9) rotate(360deg); }
        }
        
        .maker-tag {
            position: absolute; bottom: 50px; font-size: 1.4rem; font-weight: 900; letter-spacing: 3px;
            text-transform: uppercase; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: pulse-glow 2s infinite;
        }
        
        @keyframes pulse-glow { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }

        /* --- HEADER & NAVIGATION --- */
        .header-container { position: relative; max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; z-index: 50; }
        h1 { font-size: 2rem; font-weight: 900; margin: 0; background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.5px; }
        
        .more-wrapper { position: absolute; left: 0; top: 50%; transform: translateY(-50%); }
        .more-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; backdrop-filter: blur(4px); display: flex; align-items: center; gap: 5px; transition: all 0.2s ease; font-family: 'Outfit', sans-serif; }
        .more-btn:hover { background: rgba(255,255,255,0.1); }
        .more-btn:active { transform: scale(0.95); }
        
        .dropdown-menu {
            position: absolute; top: calc(100% + 10px); left: 0;
            background: rgba(24, 25, 30, 0.95); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 10px 0; min-width: 160px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); backdrop-filter: blur(15px);
            opacity: 0; visibility: hidden; transform: translateY(-10px);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
        .menu-title {
            padding: 5px 15px 10px 15px; font-size: 0.7rem; color: var(--text-muted);
            font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px;
            border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 5px;
        }
        .menu-item {
            display: flex; align-items: center; padding: 10px 15px;
            color: var(--text-main); text-decoration: none; font-size: 0.95rem; font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: var(--accent-secondary); }

        .refresh-btn { position: absolute; right: 0; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 14px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; cursor: pointer; backdrop-filter: blur(4px); display: flex; align-items: center; gap: 5px; transition: all 0.2s ease; font-family: 'Outfit', sans-serif; }
        .refresh-btn:hover { background: rgba(255,255,255,0.1); }
        .refresh-btn:active { transform: translateY(-50%) scale(0.95); }
        
        .last-updated { text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 15px; font-weight: 500; }

        /* --- TABS --- */
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(15, 16, 20, 0.85);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-top: 1px solid var(--border-color);
            display: flex; justify-content: space-around; padding: 12px 0 20px 0;
            z-index: 100;
        }
        .nav-item {
            background: transparent; border: none; color: var(--text-muted);
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif; flex: 1;
        }
        .nav-item:hover { color: #fff; }
        .nav-item.active { color: var(--accent-secondary); transform: translateY(-3px); }
        .nav-item.active .nav-icon { stroke: var(--accent-secondary); filter: drop-shadow(0 0 8px rgba(240, 152, 25, 0.6)); }
        
        /* SVG Icon styling */
        .nav-icon { width: 24px; height: 24px; transition: all 0.3s ease; stroke: var(--text-muted); }

        /* --- HOME / NEWS CARDS --- */
        .news-card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            border: 1px solid var(--border-color); cursor: pointer;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }
        .news-card:hover { border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        .news-card:active { transform: scale(0.98); }
        .news-image { width: 100%; height: 180px; object-fit: cover; border-bottom: 1px solid var(--border-color); }
        .news-content { padding: 18px; }
        .news-tag { display: inline-block; background: rgba(255, 81, 47, 0.15); color: var(--accent-secondary); padding: 4px 8px; border-radius: 6px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .news-date { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; margin-left: 8px; }
        .news-title { font-size: 1.2rem; font-weight: 800; margin: 0 0 10px 0; line-height: 1.3; color: var(--text-main); }
        .news-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin: 0; font-weight: 500; }

        /* --- DATE SLIDER & GAME CARDS --- */
        .date-slider-container { max-width: 600px; margin: 0 auto 20px auto; position: relative; z-index: 10; }
        .date-slider { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 5px; scroll-behavior: smooth; -ms-overflow-style: none; scrollbar-width: none; }
        .date-slider::-webkit-scrollbar { display: none; }
        .date-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-muted); padding: 10px 20px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); display: flex; flex-direction: column; align-items: center; gap: 2px; backdrop-filter: blur(10px); }
        .date-btn span.day { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }
        .date-btn:active { transform: scale(0.92); }
        .date-btn.active { background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); color: #fff; border-color: transparent; box-shadow: 0 8px 16px rgba(255, 81, 47, 0.3); transform: translateY(-2px); }

        .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .game-card { background: var(--card-bg); border-radius: 20px; padding: 22px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); border: 1px solid var(--border-color); cursor: pointer; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; }
        .game-card:hover { border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }
        .game-card:active { transform: scale(0.98); background: rgba(30, 32, 38, 0.8); }

        .status { text-align: center; font-size: 0.85rem; font-weight: 800; color: var(--live-red); margin-bottom: 18px; text-transform: uppercase; letter-spacing: 2px; }
        .status.post-game { color: var(--text-muted); }
        .status.pre-game { color: var(--text-main); }
        .teams-container { display: flex; justify-content: space-between; align-items: center; }
        .team { display: flex; flex-direction: column; align-items: center; width: 40%; gap: 6px; }
        .record { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; letter-spacing: 0.5px; margin-bottom: 2px; background: rgba(0,0,0,0.3); padding: 3px 8px; border-radius: 10px; }
        .logo { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 6px 8px rgba(0,0,0,0.4)); margin-bottom: 4px; }
        .team-name { font-size: 1.1rem; text-align: center; font-weight: 800; }
        .score { font-size: 2.6rem; font-weight: 900; line-height: 1; margin-top: 4px; }
        .score.dimmed { color: var(--text-muted); }
        .vs { font-size: 1.2rem; color: rgba(255,255,255,0.2); font-weight: 800; }

        /* --- MODALS & TABLES --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); z-index: 1000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: linear-gradient(180deg, #18191e 0%, #101115 100%); width: 92%; max-width: 800px; max-height: 85vh; border-radius: 24px; padding: 25px; position: relative; box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.9); border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: rgba(255,255,255,0.1); border: none; color: var(--text-muted); font-size: 1.2rem; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; transition: all 0.2s; }
        .close-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
        .modal-header { text-align: center; font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-right: 30px; }
        .modal-body { overflow-y: auto; padding-right: 5px; }
        .modal-body::-webkit-scrollbar { width: 6px; }
        .modal-body::-webkit-scrollbar-track { background: transparent; }
        .modal-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .team-box-title { font-size: 1.1rem; font-weight: 800; color: var(--accent-secondary); margin: 20px 0 12px 0; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; }
        .team-box-title::after { content: ''; flex-grow: 1; height: 1px; background: var(--border-color); }
        .team-box-title:first-child { margin-top: 0; }
        .table-container { width: 100%; overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(0,0,0,0.3); }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; min-width: 500px; }
        th { color: var(--text-muted); font-weight: 700; padding: 12px 10px; text-align: right; background: #121318; position: sticky; top: 0; z-index: 2; border-bottom: 1px solid var(--border-color); cursor: pointer; user-select: none; transition: color 0.2s; }
        th:hover { color: #fff; }
        th.active-sort { color: var(--accent-secondary); }
        td { padding: 12px 10px; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.03); color: var(--text-main); font-variant-numeric: tabular-nums; font-weight: 500; }
        tr.starter td { background: rgba(255,255,255,0.02); }
        th:first-child, td:first-child { text-align: left; font-weight: 700; position: sticky; left: 0; background-color: #121318; z-index: 3; box-shadow: 4px 0 8px rgba(0,0,0,0.3); }
        tr.starter td:first-child { background-color: #16171d; }
        th:first-child { z-index: 4; cursor: default; color: var(--text-muted); }
        .player-pos { font-size: 0.65rem; color: var(--text-muted); margin-left: 6px; font-weight: 600; }
        #loadingMsg { text-align: center; color: var(--text-muted); font-weight: 600; padding: 30px; }
        
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div id="loadingScreen" class="loading-screen">
        <div class="logo-cycler"><img id="dynamicTeamLogo" src="" alt="Loading..."></div>
        <div class="maker-tag"> Made By Vewerty Ploik </div>
    </div>

    <div id="clashScreen" class="clash-screen">
        <div id="clashEl1" class="clash-element"><img id="clashAwayLogo" class="clash-logo" src="" alt="Away"></div>
        <div id="clashEl2" class="clash-element"><div class="clash-vs-text">VS</div></div>
        <div id="clashEl3" class="clash-element"><img id="clashHomeLogo" class="clash-logo" src="" alt="Home"></div>
    </div>

    <div class="header-container">
        <div class="more-wrapper">
            <button id="moreBtn" class="more-btn" onclick="toggleMenu(event)">☰ More</button>
            <div id="moreMenu" class="dropdown-menu">
                <div class="menu-title">More Leagues</div>
                <a href="#" class="menu-item">to change to MLB or NHL just open this website url and change ‘NBA’ to ‘NHL’ or ‘MLB’</a>
                <a href="#" class="menu-item"></a>
            </div>
        </div>
        
        <h1>Live NBA Tracker</h1>
        
        <button id="refreshBtn" class="refresh-btn" onclick="forceRefresh()">↻ Sync</button>
    </div>
    
    <div id="lastUpdated" class="last-updated">Connecting to API...</div>
    
    <div id="homeTab" class="tab-content active">
        <div class="container" id="newsContainer">
            <div id="loadingMsg">Fetching important game updates...</div>
        </div>
    </div>

    <div id="scheduleTab" class="tab-content">
        <div class="date-slider-container">
            <div class="date-slider" id="dateSlider"></div>
        </div>
        <div class="container" id="tracker"></div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('home')" id="btnHome">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"></path>
                <path d="M7 7h10"></path>
                <path d="M7 12h10"></path>
                <path d="M7 17h6"></path>
            </svg>
            <span>Updates</span>
        </button>

        <button class="nav-item" onclick="switchTab('schedule')" id="btnSchedule">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            <span>Scores</span>
        </button>
    </nav>

    <div id="modalOverlay" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="closeModal()">✕</button>
            <div id="modalHeader" class="modal-header">Box Score</div>
            <div id="modalBody" class="modal-body">
                <div id="loadingMsg">Loading stats...</div>
            </div>
        </div>
    </div>

    <script>
        // --- DROPDOWN MENU LOGIC ---
        function toggleMenu(e) {
            e.stopPropagation();
            document.getElementById('moreMenu').classList.toggle('show');
        }

        window.addEventListener('click', function(e) {
            const menu = document.getElementById('moreMenu');
            if (menu.classList.contains('show') && !e.target.closest('.more-wrapper')) {
                menu.classList.remove('show');
            }
        });
        
        // --- TAB SWITCHING LOGIC ---
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(`${tabName}Tab`).classList.add('active');
            
            if(tabName === 'home') document.getElementById('btnHome').classList.add('active');
            if(tabName === 'schedule') document.getElementById('btnSchedule').classList.add('active');
        }

        // --- RANDOMIZED LOADING SCREEN LOGIC ---
        const allNbaTeams = [
            'atl', 'bos', 'bkn', 'cha', 'chi', 'cle', 'dal', 'den', 'det', 'gs', 
            'hou', 'ind', 'lac', 'lal', 'mem', 'mia', 'mil', 'min', 'no', 'ny', 
            'okc', 'orl', 'phi', 'phx', 'por', 'sac', 'sa', 'tor', 'utah', 'wsh'
        ];

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        shuffleArray(allNbaTeams);

        let logoIndex = 0;
        const logoElement = document.getElementById('dynamicTeamLogo');
        logoElement.src = `https://a.espncdn.com/i/teamlogos/nba/500/${allNbaTeams[logoIndex]}.png`;
        
        const logoInterval = setInterval(() => {
            logoIndex++;
            logoElement.src = `https://a.espncdn.com/i/teamlogos/nba/500/${allNbaTeams[logoIndex]}.png`;
        }, 350);

        setTimeout(() => {
            clearInterval(logoInterval);
            document.getElementById('loadingScreen').classList.add('hidden');
            setTimeout(() => { document.getElementById('loadingScreen').style.display = 'none'; }, 600);
            
            // Initialize App Data
            buildDateSlider();
            fetchGames();
            fetchNews();
            startAutoRefresh();
        }, 3000); 

        const BASE_URL = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard';
        const NEWS_URL = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/news';
        
        let boxScoreCache = {};
        let activeGameId = null; 
        let latestEvents = []; 
        let fetchInterval = null;
        let selectedDateObj = new Date(); 

        let currentSort = {
            away: { column: 'PTS', desc: true },
            home: { column: 'PTS', desc: true }
        };

        const STAT_COLUMNS = [
            { label: 'PTS', key: 'PTS' }, { label: 'AST', key: 'AST' },
            { label: 'REB', key: 'REB' }, { label: 'STL', key: 'STL' },
            { label: 'BLK', key: 'BLK' }, { label: 'FG%', key: 'FG' },
            { label: '3P%', key: '3PT' }, { label: 'FT%', key: 'FT' },
            { label: 'MIN', key: 'MIN' }
        ];

        function formatAPIString(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}${m}${d}`; 
        }

        function buildDateSlider() {
            const slider = document.getElementById('dateSlider');
            slider.innerHTML = '';
            const today = new Date();
            let todayBtn = null;

            for (let i = -5; i <= 5; i++) {
                const loopDate = new Date(today);
                loopDate.setDate(today.getDate() + i);
                
                const btn = document.createElement('div');
                btn.className = 'date-btn';
                
                if (i === 0) {
                    btn.innerHTML = `<span class="day">Today</span>${loopDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
                    btn.classList.add('active');
                    todayBtn = btn;
                } else {
                    btn.innerHTML = `<span class="day">${loopDate.toLocaleDateString('en-US', { weekday: 'short' })}</span>${loopDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
                }

                btn.onclick = () => selectDate(loopDate, btn);
                slider.appendChild(btn);
            }

            setTimeout(() => {
                if (todayBtn) {
                    const scrollLeft = todayBtn.offsetLeft - (slider.clientWidth / 2) + (todayBtn.clientWidth / 2);
                    slider.scrollLeft = scrollLeft;
                }
            }, 100);
        }

        async function selectDate(newDate, btnElement) {
            selectedDateObj = newDate;
            document.querySelectorAll('.date-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            
            document.getElementById('tracker').innerHTML = '<div id="loadingMsg">Fetching matchups...</div>';
            
            await fetchGames();
            startAutoRefresh(); 
        }

        /* --- FETCH & FILTER HIGHER SIGNAL NEWS --- */
        async function fetchNews() {
            try {
                const res = await fetch(NEWS_URL);
                const data = await res.json();
                renderNews(data.articles || []);
            } catch (err) {
                console.error("Error fetching news:", err);
                document.getElementById('newsContainer').innerHTML = '<div id="loadingMsg">Unable to load news at this time.</div>';
            }
        }

        function renderNews(articles) {
            const container = document.getElementById('newsContainer');
            container.innerHTML = '';

            if (articles.length === 0) {
                container.innerHTML = '<div id="loadingMsg">No recent news found.</div>';
                return;
            }

            // FILTER: Only keep high-signal "important" game/roster updates
            const keywords = ['score', 'win', 'loss', 'beat', 'points', 'stats', 'recap', 'highlights', 'trade', 'injury', 'draft', 'finals', 'playoffs', 'championship'];
            
            let importantArticles = articles.filter(article => {
                const textToCheck = (article.headline + " " + article.description).toLowerCase();
                return keywords.some(kw => textToCheck.includes(kw));
            });

            // Fallback just in case the filter clears out everything
            if (importantArticles.length === 0) importantArticles = articles.slice(0, 3);

            // Sort newest first
            importantArticles.sort((a, b) => new Date(b.published) - new Date(a.published));

            importantArticles.forEach(article => {
                const imgUrl = (article.images && article.images.length > 0) ? article.images[0].url : 'https://a.espncdn.com/i/teamlogos/nba/500/nba.png';
                const pubDate = new Date(article.published).toLocaleString('en-US', { month: 'short', day: 'numeric' });
                
                const card = document.createElement('div');
                card.className = 'news-card';
                card.onclick = () => window.open(article.links.web.href, '_blank');

                card.innerHTML = `
                    <img class="news-image" src="${imgUrl}" alt="NBA News">
                    <div class="news-content">
                        <span class="news-tag">Game Impact</span>
                        <span class="news-date">${pubDate}</span>
                        <h3 class="news-title">${article.headline}</h3>
                        <p class="news-desc">${article.description}</p>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function fetchGames() {
            try {
                const dateQuery = formatAPIString(selectedDateObj);
                const url = `${BASE_URL}?dates=${dateQuery}`;
                const response = await fetch(url);
                const data = await response.json();
                latestEvents = data.events;
                
                if (activeGameId) {
                    await fetchBoxScoreData(activeGameId);
                }
                
                updateTimestamp();
                renderMainScreen();
                if (activeGameId) renderModalContent();
                
            } catch (error) {
                console.error("Error fetching game data:", error);
                document.getElementById('lastUpdated').innerText = "Failed to update. Check connection.";
            }
        }

        function updateTimestamp() {
            const now = new Date();
            document.getElementById('lastUpdated').innerText = `Live sync: ${now.toLocaleTimeString()}`;
        }

        async function forceRefresh() {
            const btn = document.getElementById('refreshBtn');
            btn.innerHTML = '↻ Syncing...';
            btn.style.color = '#f09819';
            await fetchGames();
            await fetchNews();
            btn.innerHTML = '↻ Sync';
            btn.style.color = '';
            startAutoRefresh();
        }

        function startAutoRefresh() {
            if (fetchInterval) clearInterval(fetchInterval);
            fetchInterval = setInterval(fetchGames, 10000);
        }

        async function fetchBoxScoreData(gameId) {
            try {
                const summaryUrl = `https://site.api.espn.com/apis/site/v2/sports/basketball/nba/summary?event=${gameId}`;
                const res = await fetch(summaryUrl);
                const data = await res.json();
                boxScoreCache[gameId] = data.boxscore ? data.boxscore.players : null;
            } catch (err) {
                console.error("Error fetching box score:", err);
            }
        }

        /* --- COMPLETED RENDER MAIN SCREEN SCRIPT --- */
        function renderMainScreen() {
            const tracker = document.getElementById('tracker');
            
            if (!latestEvents || latestEvents.length === 0) {
                tracker.innerHTML = '<div id="loadingMsg">No games scheduled for this date.</div>';
                return;
            }
            
            tracker.innerHTML = '';
            
            latestEvents.forEach(game => {
                const comp = game.competitions[0];
                const away = comp.competitors.find(c => c.homeAway === 'away');
                const home = comp.competitors.find(c => c.homeAway === 'home');
                const status = game.status.type.shortDetail;
                const state = game.status.type.state; 

                let statusClass = state === 'in' ? 'live-red' : (state === 'post' ? 'post-game' : 'pre-game');

                tracker.innerHTML += `
                    <div class="game-card" onclick="openModal('${game.id}', '${away.team.abbreviation} vs ${home.team.abbreviation}')">
                        <div class="status ${statusClass}">${status}</div>
                        <div class="teams-container">
                            <div class="team">
                                <img class="logo" src="${away.team.logo}" alt="${away.team.abbreviation}">
                                <div class="team-name">${away.team.abbreviation}</div>
                                <div class="score ${state === 'pre' ? 'dimmed' : ''}">${away.score !== undefined ? away.score : '-'}</div>
                            </div>
                            <div class="vs">VS</div>
                            <div class="team">
                                <img class="logo" src="${home.team.logo}" alt="${home.team.abbreviation}">
                                <div class="team-name">${home.team.abbreviation}</div>
                                <div class="score ${state === 'pre' ? 'dimmed' : ''}">${home.score !== undefined ? home.score : '-'}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function openModal(gameId, title) {
            activeGameId = gameId;
            document.body.style.overflow = 'hidden'; 

            const game = latestEvents.find(g => g.id === gameId);
            const comp = game.competitions[0];
            const awayTeam = comp.competitors.find(c => c.homeAway === 'away').team;
            const homeTeam = comp.competitors.find(c => c.homeAway === 'home').team;

            const clashScreen = document.getElementById('clashScreen');
            const el1 = document.getElementById('clashEl1');
            const el2 = document.getElementById('clashEl2');
            const el3 = document.getElementById('clashEl3');

            document.getElementById('clashAwayLogo').src = awayTeam.logo;
            document.getElementById('clashHomeLogo').src = homeTeam.logo;

            el1.style.animation = 'none';
            el2.style.animation = 'none';
            el3.style.animation = 'none';
            clashScreen.style.opacity = '1';
            clashScreen.style.display = 'flex';

            setTimeout(() => { 
                el1.style.animation = 'slamFade 1s forwards'; 
                clashScreen.style.animation = 'screenShake 0.3s ease-in-out';
            }, 0);
            
            setTimeout(() => { 
                el2.style.animation = 'slamFade 1s forwards'; 
                clashScreen.style.animation = 'none'; 
                setTimeout(() => clashScreen.style.animation = 'screenShake 0.3s ease-in-out', 10);
            }, 1000);
            
            setTimeout(() => { 
                el3.style.animation = 'slamFade 1s forwards'; 
                clashScreen.style.animation = 'none'; 
                setTimeout(() => clashScreen.style.animation = 'screenShake 0.3s ease-in-out', 10);
            }, 2000);

            document.getElementById('modalHeader').innerText = title;
            document.getElementById('modalBody').innerHTML = '<div id="loadingMsg">Fetching full roster stats...</div>';
            
            await fetchBoxScoreData(gameId);

            setTimeout(() => {
                clashScreen.style.opacity = '0';
                setTimeout(() => { clashScreen.style.display = 'none'; }, 300);

                const overlay = document.getElementById('modalOverlay');
                overlay.classList.add('show');
                renderModalContent();
            }, 3000);
        }

        /* --- COMPLETED MODAL DATA & TABLE LOGIC --- */
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            document.body.style.overflow = 'auto';
            activeGameId = null;
        }

        function renderModalContent() {
            if (!activeGameId) return;
            const container = document.getElementById('modalBody');
            const data = boxScoreCache[activeGameId];

            if (!data) {
                container.innerHTML = '<div id="loadingMsg">Box score not available yet.</div>';
                return;
            }

            const game = latestEvents.find(g => g.id === activeGameId);
            const comp = game.competitions[0];
            const awayTeamInfo = comp.competitors.find(c => c.homeAway === 'away').team;
            const homeTeamInfo = comp.competitors.find(c => c.homeAway === 'home').team;

            const awayData = data.find(team => team.team.id === awayTeamInfo.id);
            const homeData = data.find(team => team.team.id === homeTeamInfo.id);

            container.innerHTML = `
                <div class="team-box-title">
                    <img src="${awayTeamInfo.logo}" style="width:24px;height:24px;object-fit:contain;">
                    ${awayTeamInfo.displayName}
                </div>
                ${generateTableHTML(awayData, 'away')}
                
                <div class="team-box-title">
                    <img src="${homeTeamInfo.logo}" style="width:24px;height:24px;object-fit:contain;">
                    ${homeTeamInfo.displayName}
                </div>
                ${generateTableHTML(homeData, 'home')}
            `;
        }

        function generateTableHTML(teamData, side) {
            if (!teamData || !teamData.statistics || teamData.statistics.length === 0) return '<div id="loadingMsg">No stats available</div>';
            
            const statsObj = teamData.statistics[0];
            const labels = statsObj.labels; 
            const athletes = statsObj.athletes;

            let html = '<div class="table-container"><table><thead><tr><th>Player</th>';
            
            STAT_COLUMNS.forEach(col => {
                const isActive = currentSort[side].column === col.key;
                const arrow = isActive ? (currentSort[side].desc ? ' ↓' : ' ↑') : '';
                html += `<th class="${isActive ? 'active-sort' : ''}" onclick="handleSort('${side}', '${col.key}')">${col.label}${arrow}</th>`;
            });
            html += '</tr></thead><tbody>';

            let playerRows = athletes.map(ath => {
                const p = ath.athlete;
                const stats = ath.stats; 
                let rowData = { name: p.shortName, pos: p.position ? p.position.abbreviation : '', isStarter: ath.starter };
                
                STAT_COLUMNS.forEach(col => {
                    const labelIndex = labels.indexOf(col.key);
                    rowData[col.key] = labelIndex !== -1 ? stats[labelIndex] : '-';
                });
                return rowData;
            });

            // Sorting
            const sortKey = currentSort[side].column;
            const sortDesc = currentSort[side].desc;
            playerRows.sort((a, b) => {
                let valA = parseFloat(a[sortKey]) || 0;
                let valB = parseFloat(b[sortKey]) || 0;
                if (valA < valB) return sortDesc ? 1 : -1;
                if (valA > valB) return sortDesc ? -1 : 1;
                return 0;
            });

            playerRows.forEach(p => {
                html += `<tr class="${p.isStarter ? 'starter' : ''}">
                    <td>${p.name}<span class="player-pos">${p.pos}</span></td>`;
                STAT_COLUMNS.forEach(col => {
                    html += `<td>${p[col.key]}</td>`;
                });
                html += `</tr>`;
            });

            html += '</tbody></table></div>';
            return html;
        }

        function handleSort(side, column) {
            if (currentSort[side].column === column) {
                currentSort[side].desc = !currentSort[side].desc;
            } else {
                currentSort[side].column = column;
                currentSort[side].desc = true;
            }
            renderModalContent();
        }
    </script>
</body>
</html>
